version: "3.7"
name: lms
services:
  mariadb:
    image: mariadb:10.8
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed # Temporary fix for MariaDB 10.6
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Copy docker/.env.example to docker/.env before starting Docker}
    volumes:
      - mariadb-data:/var/lib/mysql

  redis:
    image: redis:alpine

  frappe:
    image: frappe/bench:latest
    command: bash /workspace/docker/init.sh
    environment:
      SHELL: /bin/bash
      LMS_APP_NAME: "Pa's Academy"
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Copy docker/.env.example to docker/.env before starting Docker}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Copy docker/.env.example to docker/.env before starting Docker}
    working_dir: /home/frappe
    volumes:
      - ..:/workspace
    ports:
      - 127.0.0.1:8000:8000
      - 127.0.0.1:9000:9000

volumes:
  mariadb-data:
